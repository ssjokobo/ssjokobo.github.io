<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSU Jazz Jury 2/68 — Student Report</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8cc7a;
    --dark: #0e0e0e;
    --dark2: #1a1a1a;
    --dark3: #252525;
    --muted: #888;
    --text: #e8e4dc;
    --text-dim: #aaa;
    --border: rgba(201,168,76,0.2);
    --pass: #4caf7d;
    --fail: #e05252;
    --exempt: #e0a952;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    line-height: 1.7;
    min-height: 100vh;
  }

  header {
    text-align: center;
    padding: 56px 32px 44px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #1a1510 0%, var(--dark) 100%);
  }

  .header-label {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
    font-weight: 500;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 900;
    color: var(--text);
    margin-bottom: 6px;
  }

  header p {
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 1px;
  }

  /* ── SEARCH SCREEN ── */
  #search-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    padding: 48px 24px;
  }

  .search-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 24px;
  }

  .search-box {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 420px;
  }

  .search-box input {
    flex: 1;
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1.1rem;
    font-weight: 400;
    letter-spacing: 2px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus {
    border-color: var(--gold);
  }

  .search-box input::placeholder {
    color: var(--muted);
    letter-spacing: 1px;
    font-size: 0.9rem;
  }

  .search-box button {
    background: var(--gold);
    border: none;
    border-radius: 10px;
    padding: 14px 24px;
    color: #0e0e0e;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .search-box button:hover { background: var(--gold-light); }
  .search-box button:active { transform: scale(0.97); }

  .error-msg {
    margin-top: 16px;
    color: var(--fail);
    font-size: 0.875rem;
    display: none;
  }

  /* ── RESULT SCREEN ── */
  #result-screen {
    display: none;
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    margin-bottom: 32px;
    transition: border-color 0.2s, color 0.2s;
    letter-spacing: 1px;
  }

  .back-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* student card */
  .student-card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }

  .student-info { flex: 1; min-width: 200px; }

  .student-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }

  .student-meta {
    font-size: 0.825rem;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .student-meta span { margin-right: 16px; }

  .result-badge {
    padding: 8px 20px;
    border-radius: 999px;
    font-size: 0.875rem;
    font-weight: 500;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .result-pass    { background: rgba(76,175,125,0.15); color: var(--pass); border: 1px solid rgba(76,175,125,0.3); }
  .result-fail    { background: rgba(224,82,82,0.15);  color: var(--fail); border: 1px solid rgba(224,82,82,0.3); }
  .result-exempt  { background: rgba(224,169,82,0.15); color: var(--exempt); border: 1px solid rgba(224,169,82,0.3); }

  .avg-block { text-align: center; }

  .avg-number {
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
  }

  .avg-sub {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* scores */
  .section-title {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin: 28px 0 14px;
  }

  .scores-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 4px;
  }

  .score-pill {
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 20px;
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .score-pill.high { color: var(--gold-light); border-color: rgba(201,168,76,0.4); }
  .score-pill.low  { color: #777; }

  .score-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--muted);
    font-weight: 400;
  }

  /* entries */
  .entries-list { display: flex; flex-direction: column; gap: 16px; }

  .entry-card {
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .entry-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
  }

  .entry-num {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
  }

  .entry-score {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
  }

  .entry-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }

  .entry-section-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
    font-weight: 500;
  }

  .entry-text {
    font-size: 0.875rem;
    color: var(--text-dim);
    line-height: 1.8;
    white-space: pre-line;
  }

  .entry-text.empty { color: #555; font-style: italic; }

  /* score bar */
  .score-track {
    height: 2px;
    background: var(--dark3);
    border-radius: 1px;
    overflow: hidden;
    margin: 4px 0 0;
  }

  .score-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 1px;
  }

  #faculty-screen {
    display: none;
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }
  .fac-header-block { text-align: center; margin-bottom: 36px; }
  .fac-name { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 900; color: var(--text); margin-bottom: 4px; }
  .fac-sub { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 32px; }
  .metric { background: var(--dark2); border: 1px solid var(--border); border-radius: 12px; padding: 20px 16px; text-align: center; }
  .metric-num { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 900; color: var(--gold); line-height: 1; }
  .metric-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-top: 6px; }
  .chart-card { background: var(--dark2); border: 1px solid var(--border); border-radius: 16px; padding: 28px 28px 20px; margin-bottom: 28px; }
  .chart-title { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); font-weight: 500; margin-bottom: 20px; }
  .rep-row { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
  .rep-label { width: 130px; color: var(--text-dim); flex-shrink: 0; font-size: 0.875rem; }
  .rep-bar-track { flex: 1; height: 6px; background: var(--dark3); border-radius: 3px; overflow: hidden; }
  .rep-bar-fill { height: 100%; border-radius: 3px; }
  .rep-count { width: 24px; text-align: right; color: var(--muted); font-size: 0.8rem; }
  .fac-student-card { background: var(--dark2); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 16px; overflow: hidden; transition: border-color 0.2s; }
  .fac-student-card:hover { border-color: rgba(201,168,76,0.45); }
  .fac-student-header { display: flex; align-items: center; gap: 16px; padding: 20px 24px; cursor: pointer; user-select: none; }
  .fac-chevron { color: var(--muted); font-size: 14px; transition: transform 0.3s; }
  .fac-student-card.open .fac-chevron { transform: rotate(180deg); }
  .fac-student-body { display: none; border-top: 1px solid var(--border); padding: 24px; }
  .fac-student-card.open .fac-student-body { display: block; }
  .sub-section-title { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); font-weight: 500; margin: 0 0 12px; }
</style>
</head>
<body>

<header>
  <div class="header-label">Rangsit University — Jazz Program</div>
  <h1>Jazz Jury 2/68</h1>
  <p>Faculty Evaluation</p>
</header>

<!-- SEARCH -->
<div id="search-screen">
  <div class="search-label">Enter Student ID</div>
  <div class="search-box">
    <input type="text" id="id-input" placeholder="e.g. 6801234" maxlength="7" inputmode="numeric">
    <button onclick="lookup()">Search</button>
  </div>
  <div class="error-msg" id="error-msg"></div>
</div>

<!-- RESULT -->
<div id="result-screen">
  <button class="back-btn" onclick="goBack()">← Back to Search</button>
  <div id="result-content"></div>
</div>

<!-- FACULTY DASHBOARD -->
<div id="faculty-screen">
  <button class="back-btn" onclick="goBack()">← Back to Search</button>
  <div id="faculty-content"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="data.js"></script>
<script>

// Reverse-lookup: id → instructor name
const FACULTY_BY_ID = {};
Object.entries(FACULTY).forEach(([name, info]) => {
  FACULTY_BY_ID[info.id] = { name, emoji: info.emoji };
});

function scoreClass(s) {
  if (s >= 9) return 'high';
  if (s <= 5) return 'low';
  return '';
}

function resultClass(r) {
  if (r.includes('ไม่ผ่าน')) return 'result-fail';
  if (r.includes('ผ่าน')) return 'result-pass';
  return 'result-exempt';
}

function repClass(r) {
  if (r.includes('ไม่ผ่าน')) return 'rep-fail';
  if (r.includes('ผ่าน'))   return 'rep-pass';
  return 'rep-exempt';
}

function lookup() {
  const id = document.getElementById('id-input').value.trim();
  const err = document.getElementById('error-msg');
  if (!/^\d{7}$/.test(id)) {
    err.textContent = 'Student ID must be exactly 7 digits.';
    err.style.display = 'block';
    return;
  }
  // Faculty ID?
  if (FACULTY_BY_ID[id]) {
    err.style.display = 'none';
    showFacultyDashboard(FACULTY_BY_ID[id].name, FACULTY_BY_ID[id].emoji);
    return;
  }
  // Student ID?
  const student = DATA[id];
  if (!student) {
    err.textContent = 'Student ID not found. Please check and try again.';
    err.style.display = 'block';
    return;
  }
  err.style.display = 'none';
  showResult(student);
}

let scoreChartInstance = null;

function showFacultyDashboard(advName, emoji) {
  const students = Object.values(DATA)
    .filter(s => s.advisor === advName)
    .sort((a, b) => b.avg - a.avg);

  const avgs = students.map(s => s.avg);
  const classAvg = (avgs.reduce((a,b)=>a+b,0)/avgs.length).toFixed(2);
  const highest = Math.max(...avgs).toFixed(2);
  const lowest  = Math.min(...avgs).toFixed(2);

  // Build labels — show last name too if first name duplicated
  const firstNames = students.map(s => s.name.split(' ')[0]);
  const labels = students.map(s => {
    const parts = s.name.split(' ');
    const first = parts[0];
    if (firstNames.filter(n => n === first).length > 1 && parts.length > 1) {
      return [first, parts.slice(1).join(' ')];
    }
    return [first];
  });

  // Rep counts
  const repCounts = { pass: 0, fail: 0, exempt: 0 };
  students.forEach(s => {
    if (s.repertoire.includes('ไม่ผ่าน')) repCounts.fail++;
    else if (s.repertoire.includes('ผ่าน')) repCounts.pass++;
    else repCounts.exempt++;
  });
  const total = students.length;

  const repRowsHTML = [
    { label: '✅ ผ่าน',         count: repCounts.pass,   color: 'var(--pass)' },
    { label: '❌ ไม่ผ่าน',      count: repCounts.fail,   color: 'var(--fail)' },
    { label: '⚠️ ไม่ต้องสอบ',  count: repCounts.exempt, color: 'var(--exempt)' },
  ].map(r => `<div class="rep-row">
    <div class="rep-label" style="color:${r.color}">${r.label}</div>
    <div class="rep-bar-track"><div class="rep-bar-fill" style="width:${(r.count/total*100).toFixed(0)}%;background:${r.color}"></div></div>
    <div class="rep-count">${r.count}</div>
  </div>`).join('');

  const studentCardsHTML = students.map(s => {
    const pct = (s.avg/10*100).toFixed(1);
    const scoresHTML = s.entries.map((e,i) =>
      `<div class="score-pill ${scoreClass(e.score)}">${e.score}<span class="score-label">Faculty ${i+1}</span></div>`
    ).join('');
    const entriesHTML = s.entries.map((e,i) => {
      const pc = e.prepared_comment.trim();
      const tc = e.transcription_comment.trim();
      return `<div class="entry-card">
        <div class="entry-header"><span class="entry-num">Faculty ${i+1}</span><span class="entry-score">${e.score} / 10</span></div>
        <div class="entry-body">
          <div><div class="entry-section-label">Prepared Piece</div><div class="entry-text ${pc?'':'empty'}">${pc?esc(pc):'—'}</div></div>
          <div><div class="entry-section-label">Transcription</div><div class="entry-text ${tc?'':'empty'}">${tc?esc(tc):'—'}</div></div>
        </div>
      </div>`;
    }).join('');
    return `<div class="fac-student-card" id="fcard-${s.id}">
      <div class="fac-student-header" onclick="toggleFacCard('${s.id}')">
        <span class="student-id-label">${s.id}</span>
        <span class="student-name">${esc(s.name)}</span>
        <span style="font-size:10px;letter-spacing:1px;color:var(--muted);white-space:nowrap">Rep: <span class="rep-badge ${repClass(s.repertoire)}">${s.repertoire}</span></span>
        <span class="student-avg">${s.avg.toFixed(2)}</span>
        <span class="fac-chevron">▼</span>
      </div>
      <div class="fac-student-body">
        <div class="score-bar-wrap"><div class="score-bar-track"><div class="score-bar-fill" style="width:${pct}%"></div></div></div>
        <div class="sub-section-title">Scores by faculty</div>
        <div class="scores-row">${scoresHTML}</div>
        <div class="sub-section-title">Faculty comments</div>
        <div class="entries-list">${entriesHTML}</div>
      </div>
    </div>`;
  }).join('');

  const chartHeight = Math.max(220, students.length * 40 + 100);

  document.getElementById('faculty-content').innerHTML = `
    <div class="fac-header-block">
      <div class="fac-name">${esc(advName)} ${emoji}</div>
      <div class="fac-sub">Instructor Summary · Jazz Jury 2/68</div>
    </div>
    <div class="metrics">
      <div class="metric"><div class="metric-num">${total}</div><div class="metric-label">Students</div></div>
      <div class="metric"><div class="metric-num">${classAvg}</div><div class="metric-label">Class avg</div></div>
      <div class="metric"><div class="metric-num">${highest}</div><div class="metric-label">Highest</div></div>
      <div class="metric"><div class="metric-num">${lowest}</div><div class="metric-label">Lowest</div></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Average score by student</div>
      <div style="position:relative;width:100%;height:${chartHeight}px;">
        <canvas id="facScoreChart"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Repertoire results</div>
      ${repRowsHTML}
    </div>
    <div class="section-title">Students</div>
    ${studentCardsHTML}
  `;

  document.getElementById('search-screen').style.display = 'none';
  document.getElementById('faculty-screen').style.display = 'block';
  window.scrollTo(0, 0);

  // Destroy previous chart instance if exists
  if (scoreChartInstance) { scoreChartInstance.destroy(); scoreChartInstance = null; }
  scoreChartInstance = new Chart(document.getElementById('facScoreChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{ data: avgs, backgroundColor: avgs.map(a => a >= 9 ? '#c9a84c' : a >= 8 ? '#a07830' : '#6b5228'), borderRadius: 6, borderSkipped: false, barPercentage: 0.45, categoryPercentage: 0.6 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { bottom: 32 } },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.y.toFixed(2)} / 10`, title: ctx => students[ctx[0].dataIndex].name } },
      },
      scales: {
        x: {
          ticks: { display: false },
          grid: { display: false },
          border: { display: false }
        },
        y: { min: 0, max: 10, ticks: { color: '#888', stepSize: 2, font: { family: 'DM Sans' } }, grid: { color: 'rgba(255,255,255,0.05)' }, border: { display: false } }
      }
    },
    plugins: [{
      id: 'zigzagLabels',
      afterDraw(chart) {
        const xAxis = chart.scales.x;
        const ctx = chart.ctx;
        const n = labels.length;
        if (n === 0) return;

        const tickSpacing = n > 1
          ? Math.abs(xAxis.getPixelForTick(1) - xAxis.getPixelForTick(0))
          : 999;

        ctx.save();
        ctx.font = '11px DM Sans, sans-serif';
        const maxW = Math.max(...labels.map(l => {
          const lines = Array.isArray(l) ? l : [l];
          return Math.max(...lines.map(t => ctx.measureText(String(t)).width));
        }));

        const doZigzag = tickSpacing < maxW * 1.6;
        const lineH = 13;
        const baseY = xAxis.bottom + 6;

        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillStyle = '#888';

        labels.forEach((label, i) => {
          const x = xAxis.getPixelForTick(i);
          const extraY = doZigzag && (i % 2 !== 0) ? lineH + 2 : 0;
          const lines = Array.isArray(label) ? label : [label];
          lines.forEach((line, li) => {
            ctx.fillText(String(line), x, baseY + extraY + li * lineH);
          });
        });

        ctx.restore();
      }
    }]
  });
}

function toggleFacCard(id) {
  document.getElementById('fcard-' + id).classList.toggle('open');
}

function showResult(s) {
  const scores = s.entries.map(e => e.score);
  const pct = (s.avg / 10 * 100).toFixed(1);

  const scoresHTML = scores.map((sc, i) =>
    `<div class="score-pill ${scoreClass(sc)}">
      ${sc}
      <span class="score-label">Faculty ${i+1}</span>
    </div>`
  ).join('');

  const entriesHTML = s.entries.map((e, i) => {
    const pc = e.prepared_comment.trim();
    const tc = e.transcription_comment.trim();
    return `
    <div class="entry-card">
      <div class="entry-header">
        <span class="entry-num">Faculty ${i+1}</span>
        <span class="entry-score">${e.score} / 10</span>
      </div>
      <div class="entry-body">
        <div>
          <div class="entry-section-label">Prepared Piece</div>
          <div class="entry-text ${pc ? '' : 'empty'}">${pc ? esc(pc) : '—'}</div>
        </div>
        <div>
          <div class="entry-section-label">Transcription</div>
          <div class="entry-text ${tc ? '' : 'empty'}">${tc ? esc(tc) : '—'}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('result-content').innerHTML = `
    <div class="student-card">
      <div class="student-info">
        <div class="student-name">${esc(s.name)}</div>
        <div class="student-meta">
          <span>ID: ${s.id}</span>
          <span>Level: ${s.room}</span>
          <span>Instructor: ${s.advisor}</span>
        </div>
      </div>
      <div style="text-align:center">
        <div style="font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-light);margin-bottom:8px;font-weight:500;">Repertoire</div>
        <span class="result-badge ${resultClass(s.repertoire)}">${s.repertoire}</span>
      </div>
      <div class="avg-block">
        <div class="avg-number">${s.avg}</div>
        <div class="avg-sub">Average / 10</div>
        <div class="score-track" style="width:80px;margin:6px auto 0">
          <div class="score-fill" style="width:${pct}%"></div>
        </div>
      </div>
    </div>

    <div class="section-title">Scores by faculty</div>
    <div class="scores-row">${scoresHTML}</div>

    <div class="section-title" style="margin-top:32px">Faculty comments</div>
    <div class="entries-list">${entriesHTML}</div>
  `;

  document.getElementById('search-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  window.scrollTo(0, 0);
}

function goBack() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('faculty-screen').style.display = 'none';
  document.getElementById('search-screen').style.display = 'flex';
  document.getElementById('id-input').value = '';
  if (scoreChartInstance) { scoreChartInstance.destroy(); scoreChartInstance = null; }
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Enter key support
document.getElementById('id-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') lookup();
});
document.getElementById('id-input').addEventListener('input', () => {
  document.getElementById('error-msg').style.display = 'none';
});
</script>
</body>
</html>
