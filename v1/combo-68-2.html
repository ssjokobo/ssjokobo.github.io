<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSU Jazz Combo Recital — Faculty Report</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8cc7a;
    --dark: #0e0e0e;
    --dark2: #1a1a1a;
    --dark3: #252525;
    --muted: #888;
    --text: #e8e4dc;
    --text-dim: #aaa;
    --accent: #c9a84c;
    --border: rgba(201,168,76,0.2);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    line-height: 1.7;
  }

  header {
    text-align: center;
    padding: 64px 32px 48px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #1a1510 0%, var(--dark) 100%);
  }

  .header-label {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
    font-weight: 500;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900;
    color: var(--text);
    margin-bottom: 8px;
  }

  header p {
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 1px;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  .summary-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 48px;
  }

  .summary-stat {
    background: var(--dark2);
    padding: 24px;
    text-align: center;
  }

  .summary-stat .num {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 700;
    color: var(--gold);
  }

  .summary-stat .lbl {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }

  .combo-card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 24px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .combo-card:hover {
    border-color: rgba(201,168,76,0.45);
  }

  .combo-header {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 24px 28px;
    cursor: pointer;
    user-select: none;
  }

  .combo-number {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--gold);
    min-width: 48px;
  }

  .combo-title {
    flex: 1;
  }

  .combo-title h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text);
  }

  .avg-score-wrap {
    text-align: right;
  }

  .avg-score {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
  }

  .avg-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .score-bar-wrap {
    padding: 0 28px 20px;
  }

  .score-bar-track {
    height: 3px;
    background: var(--dark3);
    border-radius: 2px;
    overflow: hidden;
  }

  .score-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  .chevron {
    color: var(--muted);
    font-size: 18px;
    transition: transform 0.3s;
  }

  .combo-card.open .chevron { transform: rotate(180deg); }

  .combo-body {
    display: none;
    padding: 0 28px 28px;
    border-top: 1px solid var(--border);
    margin-top: 0;
  }

  .combo-card.open .combo-body { display: block; }

  .section-title {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin: 24px 0 12px;
  }

  .scores-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 8px;
  }

  .score-pill {
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 16px;
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text);
  }

  .score-pill.high { color: var(--gold-light); border-color: rgba(201,168,76,0.4); }
  .score-pill.low  { color: #888; }

  .original-comments {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .comment-item {
    background: var(--dark3);
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 0.875rem;
    color: var(--text-dim);
    line-height: 1.8;
    white-space: pre-line;
  }

  .comment-item .comment-num {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  footer {
    text-align: center;
    padding: 32px;
    color: var(--muted);
    font-size: 12px;
    border-top: 1px solid var(--border);
    letter-spacing: 1px;
  }
</style>
</head>

// Compute overall average
const allAvgs = Object.values(DATA).map(d => d.avg);
const overallAvg = (allAvgs.reduce((a,b) => a+b, 0) / allAvgs.length).toFixed(2);
document.getElementById('overall-avg').textContent = overallAvg;

function scoreClass(s) {
  if (s >= 9) return 'high';
  if (s <= 6) return 'low';
  return '';
}

function buildCard(num) {
  const d = DATA[num];
  const pct = (d.avg / 10 * 100).toFixed(1);

  const scoresHTML = d.scores.map(s =>
    `<span class="score-pill ${scoreClass(s)}">${s}</span>`
  ).join('');

  const commentsHTML = d.comments.map((c, i) =>
    `<div class="comment-item">
      <div class="comment-num">Faculty ${i+1}</div>
      ${c.replace(/</g,'&lt;').replace(/>/g,'&gt;')}
    </div>`
  ).join('');

  const card = document.createElement('div');
  card.className = 'combo-card';
  card.id = `card-${num}`;
  card.innerHTML = `
    <div class="combo-header" onclick="toggleCard(${num})">
      <div class="combo-number">#${num}</div>
      <div class="combo-title">
        <h2>Combo ${num}</h2>
      </div>
      <div class="avg-score-wrap">
        <div class="avg-score">${d.avg}</div>
        <div class="avg-label">/ 10 avg</div>
      </div>
      <div class="chevron">▼</div>
    </div>
    <div class="score-bar-wrap">
      <div class="score-bar-track">
        <div class="score-bar-fill" style="width:${pct}%"></div>
      </div>
    </div>
    <div class="combo-body">
      <div class="section-title">Scores from faculty</div>
      <div class="scores-row">${scoresHTML}</div>

      <div class="section-title">Comments</div>
      <div class="original-comments">${commentsHTML}</div>
    </div>
  `;
  return card;
}

const container = document.getElementById('cards-container');
Object.keys(DATA).sort((a,b) => +a - +b).forEach(num => {
  container.appendChild(buildCard(+num));
});

function toggleCard(num) {
  const card = document.getElementById(`card-${num}`);
  card.classList.toggle('open');
}

</script>
