<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSU Jazz Jury 2/68 — Student Report</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8cc7a;
    --dark: #0e0e0e;
    --dark2: #1a1a1a;
    --dark3: #252525;
    --muted: #888;
    --text: #e8e4dc;
    --text-dim: #aaa;
    --border: rgba(201,168,76,0.2);
    --pass: #4caf7d;
    --fail: #e05252;
    --exempt: #e0a952;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    line-height: 1.7;
    min-height: 100vh;
  }

  header {
    text-align: center;
    padding: 56px 32px 44px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #1a1510 0%, var(--dark) 100%);
  }

  .header-label {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
    font-weight: 500;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 900;
    color: var(--text);
    margin-bottom: 6px;
  }

  header p {
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 1px;
  }

  /* ── SEARCH SCREEN ── */
  #search-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    padding: 48px 24px;
  }

  .search-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 24px;
  }

  .search-box {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 420px;
  }

  .search-box input {
    flex: 1;
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1.1rem;
    font-weight: 400;
    letter-spacing: 2px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus {
    border-color: var(--gold);
  }

  .search-box input::placeholder {
    color: var(--muted);
    letter-spacing: 1px;
    font-size: 0.9rem;
  }

  .search-box button {
    background: var(--gold);
    border: none;
    border-radius: 10px;
    padding: 14px 24px;
    color: #0e0e0e;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .search-box button:hover { background: var(--gold-light); }
  .search-box button:active { transform: scale(0.97); }

  .error-msg {
    margin-top: 16px;
    color: var(--fail);
    font-size: 0.875rem;
    display: none;
  }

  /* ── RESULT SCREEN ── */
  #result-screen {
    display: none;
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    margin-bottom: 32px;
    transition: border-color 0.2s, color 0.2s;
    letter-spacing: 1px;
  }

  .back-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* student card */
  .student-card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }

  .student-info { flex: 1; min-width: 200px; }

  .student-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }

  .student-meta {
    font-size: 0.825rem;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .student-meta span { margin-right: 16px; }

  .result-badge {
    padding: 8px 20px;
    border-radius: 999px;
    font-size: 0.875rem;
    font-weight: 500;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .result-pass    { background: rgba(76,175,125,0.15); color: var(--pass); border: 1px solid rgba(76,175,125,0.3); }
  .result-fail    { background: rgba(224,82,82,0.15);  color: var(--fail); border: 1px solid rgba(224,82,82,0.3); }
  .result-exempt  { background: rgba(224,169,82,0.15); color: var(--exempt); border: 1px solid rgba(224,169,82,0.3); }

  .avg-block { text-align: center; }

  .avg-number {
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
  }

  .avg-sub {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* scores */
  .section-title {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin: 28px 0 14px;
  }

  .scores-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 4px;
  }

  .score-pill {
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 20px;
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .score-pill.high { color: var(--gold-light); border-color: rgba(201,168,76,0.4); }
  .score-pill.low  { color: #777; }

  .score-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--muted);
    font-weight: 400;
  }

  /* entries */
  .entries-list { display: flex; flex-direction: column; gap: 16px; }

  .entry-card {
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .entry-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
  }

  .entry-num {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
  }

  .entry-score {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
  }

  .entry-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }

  .entry-section-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
    font-weight: 500;
  }

  .entry-text {
    font-size: 0.875rem;
    color: var(--text-dim);
    line-height: 1.8;
    white-space: pre-line;
  }

  .entry-text.empty { color: #555; font-style: italic; }

  /* score bar */
  .score-track {
    height: 2px;
    background: var(--dark3);
    border-radius: 1px;
    overflow: hidden;
    margin: 4px 0 0;
  }

  .score-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 1px;
  }
</style>
</head>
<body>

<header>
  <div class="header-label">Rangsit University — Jazz Program</div>

<div id="search-screen">
  <div class="search-label">Enter Student ID</div>

    <input type="text" id="id-input" placeholder="e.g. 6800087" maxlength="7" inputmode="numeric">
    <button onclick="lookup()">Search</button>
  </div>

</div>

<!-- RESULT -->
<div id="result-screen">
  <button class="back-btn" onclick="goBack()">← Back to Search</button>
  <div id="result-content"></div>
</div>

function scoreClass(s) {
  if (s >= 9) return 'high';
  if (s <= 5) return 'low';
  return '';
}

function resultClass(r) {
  if (r.includes('ไม่ผ่าน')) return 'result-fail';
  if (r.includes('ผ่าน')) return 'result-pass';
  return 'result-exempt';
}

function lookup() {
  const id = document.getElementById('id-input').value.trim();
  const err = document.getElementById('error-msg');
  if (!/^\d{7}$/.test(id)) {
    err.textContent = 'Student ID must be exactly 7 digits.';
    err.style.display = 'block';
    return;
  }
  const student = DATA[id];
  if (!student) {
    err.textContent = 'Student ID not found. Please check and try again.';
    err.style.display = 'block';
    return;
  }
  err.style.display = 'none';
  showResult(student);
}

function showResult(s) {
  const scores = s.entries.map(e => e.score);
  const pct = (s.avg / 10 * 100).toFixed(1);

  const scoresHTML = scores.map((sc, i) =>
    `<div class="score-pill ${scoreClass(sc)}">
      ${sc}
      <span class="score-label">Faculty ${i+1}</span>
    </div>`
  ).join('');

  const entriesHTML = s.entries.map((e, i) => {
    const pc = e.prepared_comment.trim();
    const tc = e.transcription_comment.trim();
    return `
    <div class="entry-card">
      <div class="entry-header">
        <span class="entry-num">Faculty ${i+1}</span>
        <span class="entry-score">${e.score} / 10</span>
      </div>
      <div class="entry-body">
        <div>
          <div class="entry-section-label">Prepared Piece</div>
          <div class="entry-text ${pc ? '' : 'empty'}">${pc ? esc(pc) : '—'}</div>
        </div>
        <div>
          <div class="entry-section-label">Transcription</div>
          <div class="entry-text ${tc ? '' : 'empty'}">${tc ? esc(tc) : '—'}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('result-content').innerHTML = `
    <div class="student-card">
      <div class="student-info">
        <div class="student-name">${esc(s.name)}</div>
        <div class="student-meta">
          <span>ID: ${s.id}</span>
          <span>Level: ${s.room}</span>
          <span>Instructor: ${s.advisor}</span>
        </div>
      </div>
      <div style="text-align:center">
        <div style="font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-light);margin-bottom:8px;font-weight:500;">Repertoire</div>
        <span class="result-badge ${resultClass(s.repertoire)}">${s.repertoire}</span>
      </div>
      <div class="avg-block">
        <div class="avg-number">${s.avg}</div>
        <div class="avg-sub">Average / 10</div>
        <div class="score-track" style="width:80px;margin:6px auto 0">
          <div class="score-fill" style="width:${pct}%"></div>
        </div>
      </div>
    </div>

    <div class="section-title">Scores by faculty</div>
    <div class="scores-row">${scoresHTML}</div>

    <div class="section-title" style="margin-top:32px">Faculty comments</div>
    <div class="entries-list">${entriesHTML}</div>
  `;

  document.getElementById('search-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  window.scrollTo(0, 0);
}

function goBack() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('search-screen').style.display = 'flex';
  document.getElementById('id-input').value = '';
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Enter key support
document.getElementById('id-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') lookup();
});
document.getElementById('id-input').addEventListener('input', () => {
  document.getElementById('error-msg').style.display = 'none';
});
</script>
