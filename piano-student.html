<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jazz Piano — Student Page</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    :root { --page-accent: #c77dff; }

    /* ── Layout ── */
    .student-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    @media (max-width: 640px) { .student-grid { grid-template-columns: 1fr; } }

    /* ── Cards ── */
    .s-card {
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }
    .s-card--accent { border-top: 2px solid var(--page-accent); }
    .s-card__eyebrow {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 0.6rem;
    }
    .s-card__heading {
      font-family: var(--font-display);
      font-size: 1.6rem;
      letter-spacing: 1.5px;
      color: #fff;
      margin-bottom: 0.25rem;
    }
    .s-card__sub {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.06em;
      color: var(--text-2);
    }

    /* ── Current Week ── */
    .current-week-card {
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-top: 2px solid var(--page-accent);
      border-radius: var(--radius);
      padding: 1.75rem;
      margin-bottom: 2.5rem;
    }
    .cw-header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .cw-week-badge {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--page-accent);
      background: color-mix(in srgb, var(--page-accent) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--page-accent) 30%, transparent);
      padding: 3px 9px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .cw-title {
      font-family: var(--font-display);
      font-size: 1.15rem;
      letter-spacing: 1px;
      color: #fff;
    }
    .cw-date {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-3);
      margin-left: auto;
    }
    .cw-section-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 0.6rem;
      margin-top: 1.25rem;
    }
    .cw-content-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .cw-content-list li {
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.03em;
      color: #e2e2e2;
      padding: 6px 0 6px 1.1rem;
      border-bottom: 1px solid color-mix(in srgb, var(--border) 60%, transparent);
      line-height: 1.55;
      position: relative;
    }
    .cw-content-list li::before {
      content: '·';
      position: absolute;
      left: 0;
      color: var(--page-accent);
    }
    .cw-content-list li:last-child { border-bottom: none; }

    /* ── Homework / PDF items ── */
    .hw-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .hw-list li a {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 10px 0;
      border-bottom: 1px solid color-mix(in srgb, var(--border) 60%, transparent);
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .hw-list li:last-child a { border-bottom: none; }
    .hw-list li a:hover { opacity: 0.75; }
    .hw-label {
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.03em;
      color: #e2e2e2;
      flex: 1;
    }
    /* PDF badge — keyboard.html style */
    .hw-pdf-badge {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: var(--bg-2);
      border: 1px solid var(--page-accent);
      color: var(--page-accent);
      padding: 2px 7px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* ── Jury panels ── */
    .exam-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    @media (max-width: 640px) { .exam-grid { grid-template-columns: 1fr; } }

    .exam-card {
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }
    .exam-card--mid { border-top: 2px solid #fbbf24; }
    .exam-card--fin { border-top: 2px solid #f87171; }

    .exam-card__heading {
      font-family: var(--font-display);
      font-size: 1.1rem;
      letter-spacing: 1.5px;
      color: #fff;
      margin-bottom: 0.25rem;
    }
    .exam-card__weight {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--text-3);
      margin-bottom: 1.25rem;
    }
    /* ── Score result block ── */
    .jury-result {
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-top: 1.25rem;
      margin-bottom: 0;
      border: 1px solid var(--border);
    }
    .jury-result--mid  { background: rgba(251,191,36,.08);  border-color: rgba(251,191,36,.3); }
    .jury-result--fin  { background: rgba(248,113,113,.08); border-color: rgba(248,113,113,.3); }
    .jury-result--pending { background: var(--bg-2); }
    .jury-result__num {
      font-family: var(--font-display);
      font-size: 2.8rem;
      letter-spacing: 2px;
      color: #fff;
      line-height: 1;
    }
    .jury-result--mid .jury-result__num { color: #fbbf24; }
    .jury-result--fin .jury-result__num { color: #f87171; }
    .jury-result__denom {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-3);
      letter-spacing: 0.06em;
      margin-left: 4px;
    }
    .jury-result__label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-top: 4px;
    }
    .jury-result__pending {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.1em;
      color: var(--text-4);
    }
    .exam-sub-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-3);
      margin: 1rem 0 0.5rem;
    }
    .exam-item {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      padding: 7px 0;
      border-bottom: 1px solid color-mix(in srgb, var(--border) 50%, transparent);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.03em;
      color: #e2e2e2;
      line-height: 1.55;
    }
    .exam-item:last-child { border-bottom: none; }
    .exam-item__dot { color: var(--page-accent); flex-shrink: 0; margin-top: 2px; }
    .exam-item a { color: inherit; text-decoration: none; }
    .exam-item a:hover { color: var(--page-accent); }
    .exam-item__key {
      font-size: 10px;
      color: var(--text-3);
      margin-left: 5px;
    }
    /* Repertoire link row */
    .exam-item--rep a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: #e2e2e2;
    }
    .exam-item--rep a:hover { color: var(--page-accent); }
    .rep-link-badge {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: var(--bg-2);
      border: 1px solid var(--page-accent);
      color: var(--page-accent);
      padding: 1px 6px;
      border-radius: 3px;
      opacity: 0.7;
    }

    /* ── Previous Weeks ── */
    .prev-weeks { margin-bottom: 2.5rem; }
    .prev-week-item {
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 6px;
      overflow: hidden;
    }
    .prev-week-toggle {
      width: 100%;
      background: var(--bg-1);
      border: none;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
    }
    .prev-week-toggle:hover { background: var(--bg-2); }
    .prev-week-toggle__week {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-3);
      width: 48px;
      flex-shrink: 0;
    }
    .prev-week-toggle__title {
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.03em;
      color: #e2e2e2;
      flex: 1;
    }
    .prev-week-toggle__date {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-3);
      flex-shrink: 0;
    }
    .prev-week-grade {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      width: 22px;
      text-align: center;
      flex-shrink: 0;
    }
    .prev-week-grade--A { color: #4ade80; }
    .prev-week-grade--B { color: var(--page-accent); }
    .prev-week-grade--C { color: #fbbf24; }
    .prev-week-grade--D { color: #fb923c; }
    .prev-week-grade--F { color: #f87171; }
    .prev-week-chevron {
      font-size: 10px;
      color: var(--text-3);
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .prev-week-item.open .prev-week-chevron { transform: rotate(180deg); }
    .prev-week-body {
      display: none;
      background: var(--bg-2);
      border-top: 1px solid var(--border);
      padding: 1.1rem 1.25rem 1.35rem;
    }
    .prev-week-item.open .prev-week-body { display: block; }
    .prev-body-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-3);
      margin: 0.85rem 0 0.45rem;
    }
    .prev-body-label:first-child { margin-top: 0; }
    .prev-body-note {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.03em;
      color: #e2e2e2;
      line-height: 1.65;
      padding: 9px 12px;
      background: var(--bg-1);
      border-radius: 5px;
      border: 1px solid var(--border);
    }

    /* ── Grading — keyboard.html style ── */
    .grade-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 600px) { .grade-grid { grid-template-columns: repeat(2, 1fr); } }

    .grade-item {
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .grade-item__label {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-3);
      letter-spacing: 0.06em;
    }
    .grade-item__value {
      font-family: var(--font-display);
      font-size: 1.6rem;
      color: var(--page-accent);
      letter-spacing: 1px;
    }

    .letter-grades {
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1.5rem;
      margin-bottom: 1.5rem;
    }
    .letter-grade {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-3);
      letter-spacing: 0.06em;
    }
    .letter-grade span {
      color: var(--text);
      font-weight: 500;
    }

    /* ── Loading / Error ── */
    .page-state {
      min-height: 40vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.1em;
      color: var(--text-3);
    }
    .page-state--error { color: #ff6b6b; }
  </style>
</head>

  <script src="js/main.js"></script>
  <script>

    function gradeColorClass(g) {
      const map = { A:'--A', B:'--B', C:'--C', D:'--D', F:'--F' };
      return map[g] || '';
    }

    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso + 'T00:00:00');
      return d.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
    }

    function getCurrentWeek(weeks) {
      if (!weeks || !weeks.length) return null;
      return weeks.reduce((max, w) => w.week > max.week ? w : max, weeks[0]);
    }

    function getPreviousWeeks(weeks, currentWeekNum) {
      return (weeks || []).filter(w => w.week !== currentWeekNum).sort((a,b) => b.week - a.week);
    }

    // ── PDF homework list ───────────────────────────────────────────────────────

    function hwList(items) {
      if (!items || !items.length) return `<span style="font-family:var(--font-mono);font-size:12px;color:var(--text-3);">No homework assigned.</span>`;
      return `<ul class="hw-list">${items.map(h => `
        <li><a href="${h.url}" target="_blank">
          <span class="hw-label">${h.label}</span>
          <span class="hw-pdf-badge">PDF</span>
        </a></li>`).join('')}</ul>`;
    }

    // ── Current Week ────────────────────────────────────────────────────────────

    function buildCurrentWeek(cw) {
      if (!cw) return '<p style="font-family:var(--font-mono);font-size:13px;color:var(--text-3);">No current week data.</p>';
      const contentItems = Array.isArray(cw.content)
        ? cw.content.map(c => `<li>${c}</li>`).join('')
        : `<li>${cw.content}</li>`;
      return `
        <div class="current-week-card">
          <div class="cw-header">
            <span class="cw-week-badge">Week ${cw.week}</span>
            <span class="cw-title">${cw.title}</span>
            <span class="cw-date">${formatDate(cw.date)}</span>
          </div>
          <div class="cw-section-label">Content</div>
          <ul class="cw-content-list">${contentItems}</ul>
          <div class="cw-section-label">Homework</div>
          ${hwList(cw.homework)}
        </div>`;
    }

    // ── Juries ──────────────────────────────────────────────────────────────────

    function buildMidterm(m) {
      if (!m) return '';
      const scoreHtml = m.score != null
        ? `<div class="jury-result jury-result--mid">
            <div class="jury-result__num">${m.score}<span class="jury-result__denom">/100</span></div>
            <div class="jury-result__label">Midterm Score</div>
          </div>`
        : `<div class="jury-result jury-result--pending">
            <div class="jury-result__pending">Not yet graded</div>
          </div>`;
      const techniques = (m.techniques || []).map(t =>
        `<div class="exam-item"><span class="exam-item__dot">·</span>${t}</div>`).join('');
      const etudes = (m.etudes || []).map(e =>
        `<div class="exam-item"><span class="exam-item__dot">·</span><a href="${e.url}" target="_blank">${e.label}</a></div>`).join('');
      return `
        <div class="exam-card exam-card--mid">
          <div class="exam-card__heading">MIDTERM JURY</div>
          <div class="exam-card__weight">20% of final grade</div>
          <div class="exam-sub-label">Techniques</div>${techniques}
          <div class="exam-sub-label">Etudes</div>${etudes}
          ${scoreHtml}
        </div>`;
    }

    function buildFinals(f) {
      if (!f) return '';
      const scoreHtml = f.score != null
        ? `<div class="jury-result jury-result--fin">
            <div class="jury-result__num">${f.score}<span class="jury-result__denom">/100</span></div>
            <div class="jury-result__label">Final Score</div>
          </div>`
        : `<div class="jury-result jury-result--pending">
            <div class="jury-result__pending">Not yet graded</div>
          </div>`;
      const pieces = (f.pieces || []).map(p =>
        `<div class="exam-item"><span class="exam-item__dot">·</span><span>${p.title}<span class="exam-item__key">${p.key}</span></span></div>`).join('');
      const transcription = f.transcription
        ? `<div class="exam-item"><span class="exam-item__dot">·</span><span>${f.transcription.title}</span></div>`
        : '';
      const repertoire = `
        <div class="exam-sub-label">Repertoires</div>
        <div class="exam-item exam-item--rep">
          <span class="exam-item__dot">·</span>
          <a href="rep.html" target="_blank">
            Year 1 / Semester 1 Repertoires
            <span class="rep-link-badge">View</span>
          </a>
        </div>`;
      return `
        <div class="exam-card exam-card--fin">
          <div class="exam-card__heading">FINAL JURY</div>
          <div class="exam-card__weight">30% of final grade</div>
          <div class="exam-sub-label">Required Pieces</div>${pieces}
          <div class="exam-sub-label">Transcription</div>${transcription}
          ${repertoire}
          ${scoreHtml}
        </div>`;
    }

    // ── Previous Weeks ──────────────────────────────────────────────────────────

    function buildPreviousWeeks(prevWeeks) {
      if (!prevWeeks || !prevWeeks.length) return '<p style="font-family:var(--font-mono);font-size:13px;color:var(--text-3);">No previous weeks yet.</p>';
      return prevWeeks.map(w => {
        const grCls = `prev-week-grade prev-week-grade${gradeColorClass(w.grade)}`;
        const contentItems = Array.isArray(w.content)
          ? w.content.map(c => `<li>${c}</li>`).join('')
          : `<li>${w.content}</li>`;
        return `
          <div class="prev-week-item">
            <button class="prev-week-toggle" onclick="toggleWeek(this)">
              <span class="prev-week-toggle__week">Wk ${w.week}</span>
              <span class="prev-week-toggle__title">${w.title}</span>
              <span class="prev-week-toggle__date">${formatDate(w.date)}</span>
              <span class="${grCls}">${w.grade || '–'}</span>
              <span class="prev-week-chevron">▾</span>
            </button>
            <div class="prev-week-body">
              <div class="prev-body-label">Content</div>
              <div class="prev-body-note"><ul class="cw-content-list" style="margin:0">${contentItems}</ul></div>
              ${w.homework && w.homework.length ? `<div class="prev-body-label">Homework</div>${hwList(w.homework)}` : ''}
              ${w.note ? `<div class="prev-body-label">Instructor Note</div><div class="prev-body-note">${w.note}</div>` : ''}
            </div>
          </div>`;
      }).join('');
    }

    function toggleWeek(btn) {
      btn.closest('.prev-week-item').classList.toggle('open');
    }

    // ── Grading section ─────────────────────────────────────────────────────────

    function buildGrading() {
      return `
        <div class="content-section" style="margin-top:3rem">
          <div class="content-section__label">Grading</div>
          <div class="grade-grid">
            <div class="grade-item">
              <div class="grade-item__label">Weekly Lessons</div>
              <div class="grade-item__value">50%</div>
            </div>
            <div class="grade-item">
              <div class="grade-item__label">Midterm Jury</div>
              <div class="grade-item__value">20%</div>
            </div>
            <div class="grade-item">
              <div class="grade-item__label">Final Jury</div>
              <div class="grade-item__value">30%</div>
            </div>
          </div>
          <div class="letter-grades">
            <div class="letter-grade"><span>A</span> = 85–100%</div>
            <div class="letter-grade"><span>B+</span> = 80–84%</div>
            <div class="letter-grade"><span>B</span> = 75–79%</div>
            <div class="letter-grade"><span>C+</span> = 70–74%</div>
            <div class="letter-grade"><span>C</span> = 65–69%</div>
            <div class="letter-grade"><span>D+</span> = 60–64%</div>
            <div class="letter-grade"><span>D</span> = 55–59%</div>
            <div class="letter-grade"><span>F</span> = 0–54%</div>
          </div>
        </div>`;
    }

    function sectionLabel(text) {
      return `<div class="section__label" style="margin-bottom:1.25rem">${text}</div>`;
    }

    // ── Main Render ─────────────────────────────────────────────────────────────

    async function loadStudent() {
      const params = new URLSearchParams(window.location.search);
      let studentId = params.get('id');
      if (!studentId) {
        const parts = window.location.pathname.split('/').filter(Boolean);
        studentId = parts[parts.length - 1].replace('.html', '');
      }

      const main    = document.getElementById('main-content');
      const loading = document.getElementById('loading-state');

      if (!studentId || !/^\d{7}$/.test(studentId)) {
        loading.textContent = 'No valid student ID found.';
        loading.classList.add('page-state--error');
        return;
      }

      let data;
      try {
        const res = await fetch(`media/piano/students/${studentId}.json`);
        if (!res.ok) throw new Error(`${res.status}`);
        data = await res.json();
      } catch (err) {
        loading.textContent = `Could not load data for student ${studentId}. (${err.message})`;
        loading.classList.add('page-state--error');
        return;
      }

      const currentWeek    = getCurrentWeek(data.weeks);
      const currentWeekNum = currentWeek ? currentWeek.week : null;
      const prevWeeks      = getPreviousWeeks(data.weeks, currentWeekNum);

      document.title = `${data.firstName} ${data.lastName} — Jazz Piano`;
      document.getElementById('hero-eyebrow').textContent  = `${data.course} · ${data.semester}`;
      document.getElementById('hero-title').textContent    = `${data.firstName.toUpperCase()} "${data.nickname.toUpperCase()}"`;
      document.getElementById('hero-subtitle').textContent = `${data.firstName} ${data.lastName} · ID ${data.id}`;

      main.innerHTML = `

        <!-- Basic Info -->
        <div class="content-section">
          ${sectionLabel('Student Info')}
          <div class="student-grid">
            <div class="s-card s-card--accent">
              <div class="s-card__eyebrow">Enrolled</div>
              <div class="s-card__heading">${data.course}</div>
              <div class="s-card__sub">${data.semester}</div>
            </div>
            <div class="s-card">
              <div class="s-card__eyebrow">Student ID</div>
              <div class="s-card__heading" style="font-size:1.3rem;letter-spacing:3px">${data.id}</div>
              <div class="s-card__sub">${data.firstName} ${data.lastName} · ${data.nickname}</div>
            </div>
          </div>
        </div>

        <!-- Current Week -->
        <div class="content-section">
          ${sectionLabel('Current Week')}
          ${buildCurrentWeek(currentWeek)}
        </div>

        <!-- Juries -->
        <div class="content-section">
          ${sectionLabel('Juries')}
          <div class="exam-grid">
            ${buildMidterm(data.midterm)}
            ${buildFinals(data.finals)}
          </div>
        </div>

        <!-- Previous Weeks -->
        <div class="content-section">
          ${sectionLabel('Previous Weeks')}
          <div class="prev-weeks">${buildPreviousWeeks(prevWeeks)}</div>
        </div>

        <!-- Grading -->
        ${buildGrading()}
      `;
    }

    loadStudent();
  </script>
</body>
</html>
